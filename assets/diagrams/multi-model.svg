<svg width="900" height="480" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #0f172a; stroke: #334155; stroke-width: 1.5; rx: 10; }
    .text { fill: #e2e8f0; font-size: 13px; }
    .title { fill: #22c55e; font-size: 14px; font-weight: bold; }
    .arrow { stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect class="box" x="350" y="20" width="200" height="40"/>
  <text class="text" x="390" y="45">👤 User Input</text>

  <!-- Router -->
  <rect class="box" x="300" y="90" width="300" height="60"/>
  <text class="title" x="330" y="115">Routing Engine</text>
  <text class="text" x="320" y="135">Cost • Latency • Task Type</text>

  <!-- Models -->
  <rect class="box" x="120" y="200" width="180" height="60"/>
  <text class="text" x="150" y="235">🤖 OpenAI</text>

  <rect class="box" x="360" y="200" width="180" height="60"/>
  <text class="text" x="390" y="235">🤖 Claude</text>

  <rect class="box" x="600" y="200" width="180" height="60"/>
  <text class="text" x="630" y="235">🤖 Gemini</text>

  <!-- Aggregation -->
  <rect class="box" x="300" y="300" width="300" height="70"/>
  <text class="title" x="330" y="325">Aggregation Layer</text>
  <text class="text" x="310" y="345">Ranking • Fallback • Merging</text>

  <!-- Output -->
  <rect class="box" x="350" y="400" width="200" height="40"/>
  <text class="text" x="390" y="425">🖥️ Final Output</text>

  <!-- Arrows -->
  <line class="arrow" x1="450" y1="60" x2="450" y2="90"/>
  <line class="arrow" x1="450" y1="150" x2="210" y2="200"/>
  <line class="arrow" x1="450" y1="150" x2="450" y2="200"/>
  <line class="arrow" x1="450" y1="150" x2="690" y2="200"/>

  <line class="arrow" x1="210" y1="260" x2="450" y2="300"/>
  <line class="arrow" x1="450" y1="260" x2="450" y2="300"/>
  <line class="arrow" x1="690" y1="260" x2="450" y2="300"/>

  <line class="arrow" x1="450" y1="370" x2="450" y2="400"/>
</svg>