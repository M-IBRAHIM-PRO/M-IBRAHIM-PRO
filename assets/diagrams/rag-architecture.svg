<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #0f172a; stroke: #334155; stroke-width: 1.5; rx: 10; }
    .text { fill: #e2e8f0; font-size: 13px; font-family: Arial, sans-serif; }
    .title { fill: #38bdf8; font-size: 14px; font-weight: bold; }
    .arrow { stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Boxes -->
  <rect class="box" x="350" y="20" width="200" height="40"/>
  <text class="text" x="400" y="45">👤 User Query</text>

  <rect class="box" x="350" y="80" width="200" height="50"/>
  <text class="title" x="375" y="105">API Layer</text>
  <text class="text" x="380" y="120">Next.js / Go</text>

  <rect class="box" x="300" y="150" width="300" height="70"/>
  <text class="title" x="330" y="175">Query Processing</text>
  <text class="text" x="320" y="195">Cleaning • Chunking • Embeddings</text>

  <rect class="box" x="100" y="250" width="250" height="70"/>
  <text class="title" x="130" y="275">Vector DB</text>
  <text class="text" x="130" y="295">Qdrant (Semantic Search)</text>

  <rect class="box" x="550" y="250" width="250" height="70"/>
  <text class="title" x="580" y="275">Document Store</text>
  <text class="text" x="580" y="295">Raw + Indexed Docs</text>

  <rect class="box" x="350" y="350" width="200" height="60"/>
  <text class="title" x="380" y="375">LLM Layer</text>
  <text class="text" x="370" y="395">OpenAI / Claude</text>

  <rect class="box" x="350" y="440" width="200" height="40"/>
  <text class="text" x="380" y="465">🖥️ Response</text>

  <!-- Arrows -->
  <line class="arrow" x1="450" y1="60" x2="450" y2="80"/>
  <line class="arrow" x1="450" y1="130" x2="450" y2="150"/>
  <line class="arrow" x1="450" y1="220" x2="225" y2="250"/>
  <line class="arrow" x1="450" y1="220" x2="675" y2="250"/>
  <line class="arrow" x1="225" y1="320" x2="450" y2="350"/>
  <line class="arrow" x1="675" y1="320" x2="450" y2="350"/>
  <line class="arrow" x1="450" y1="410" x2="450" y2="440"/>
</svg>